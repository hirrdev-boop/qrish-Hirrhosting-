<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir TokoHirrShop</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 400px; margin: auto; background: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #00a651; color: white; border: none; font-weight: bold; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        .total { font-size: 24px; font-weight: bold; color: #333; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h2>TokoHirrShop 🛒</h2>
    <label>Masukkan Total Belanja (Rp)</label>
    <input type="number" id="amountInput" value="25000" step="1000">
    <button onclick="generateQR()">📱 Tampilkan QRIS Bayar</button>
    <div class="total">Rp <span id="totalDisplay">5000</span></div>
    <div id="qrcode"></div>
    <p style="font-size:12px; color:gray; text-align:center;">Scan QRIS ini untuk membayar</p>
</div>
<script>
// String QRIS ASLI milikmu
const baseQR = "00020101021126570011ID.DANA.WWW011893600915301933327102090193332710303UMI51440014ID.CO.QRIS.WWW0215ID10254584733410303UMI5204549953033605802ID5912TokoHirrShop6004720861058086163041292";

let qrCodeInstance = null;

function generateQR() {
    const amount = document.getElementById('amountInput').value;
    document.getElementById('totalDisplay').innerText = parseInt(amount).toLocaleString();
    
    // Panggil API converter untuk mengubah statis ke dinamis
    const apiUrl = `https://api-qris-static-to-dynamic.vercel.app/api/orderkuota/cqris?amount=${amount}&fee=0&codeqr=${encodeURIComponent(baseQR)}`;
    
    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            if (data.status && data.result.qrString) {
                const dynamicQR = data.result.qrString;
                // Hapus QR lama
                document.getElementById('qrcode').innerHTML = '';
                // Generate QR baru
                qrCodeInstance = new QRCode(document.getElementById('qrcode'), {
                    text: dynamicQR,
                    width: 220,
                    height: 220,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else {
                alert('Gagal generate QR, coba lagi nanti.');
            }
        })
        .catch(err => {
            alert('Error koneksi ke server: ' + err);
        });
}

// Jalankan otomatis saat halaman dibuka
window.onload = generateQR;
</script>
</body>
</html>
